{% extends "base.html" %}
{% block title %}Create Group | The Open Kitchen{% endblock %}

{% block content %}
<section class="section-head">
    <div>
        <h2>Create a Group</h2>
        <p>Give your group a name and description. You'll be the group leader.</p>
    </div>
</section>

<div class="row justify-content-center">
    <div class="col-md-6">
        <article class="recipe-card">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Group Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. Sunday Bakers" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="What's this group about?"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Create Group</button>
                    <a href="{{ url_for('my_groups') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </article>
    </div>
</div>
{% endblock %}
