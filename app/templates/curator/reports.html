{% extends "base.html" %}
{% block title %}Reports | The Open Kitchen{% endblock %}

{% block content %}
<a href="{{ url_for('curator_dashboard') }}" class="back-link">← Back to Curator Dashboard</a>

<div class="stats-panel" style="display: flex; gap: 18px; flex-wrap: wrap;">

    <a href="{{ url_for('curator_user_activity') }}" style="text-decoration: none; color: inherit; flex: 1 1 180px;">
        <div class="stat-card" style="display: flex; flex-direction: column; align-items: center; padding: 2rem 1.5rem; cursor: pointer; transition: box-shadow .2s ease;" onmouseover="this.style.boxShadow='0 4px 18px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow=''">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" style="color: var(--primary); margin-bottom: 12px;" class="bi bi-people-fill" viewBox="0 0 16 16">
                <path d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5"/>
            </svg>
            <span class="stat-number">{{ stats.active_users }}</span>
            <span class="stat-label">Active User Accounts</span>
        </div>
    </a>

    <a href="{{ url_for('curator_recipe_stats') }}" style="text-decoration: none; color: inherit; flex: 1 1 180px;">
        <div class="stat-card" style="display: flex; flex-direction: column; align-items: center; padding: 2rem 1.5rem; cursor: pointer; transition: box-shadow .2s ease;" onmouseover="this.style.boxShadow='0 4px 18px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow=''">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" style="color: var(--primary); margin-bottom: 12px;" class="bi bi-journal-richtext" viewBox="0 0 16 16">
                <path d="M7.5 3.75a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0m-.861 1.542 1.33.886 1.854-1.855a.25.25 0 0 1 .289-.047l1.888.974V7.5h-8V5.5l2.18-1.298a.25.25 0 0 1 .26.09zM4 8.5h8v5.5H4zM2 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2z"/>
            </svg>
            <span class="stat-number">{{ stats.total_recipes }}</span>
            <span class="stat-label">Recipes</span>
        </div>
    </a>

    <a href="{{ url_for('curator_message_stats') }}" style="text-decoration: none; color: inherit; flex: 1 1 180px;">
        <div class="stat-card" style="display: flex; flex-direction: column; align-items: center; padding: 2rem 1.5rem; cursor: pointer; transition: box-shadow .2s ease;" onmouseover="this.style.boxShadow='0 4px 18px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow=''">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" style="color: var(--primary); margin-bottom: 12px;" class="bi bi-chat-dots-fill" viewBox="0 0 16 16">
                <path d="M16 8c0 3.866-3.582 7-8 7a9 9 0 0 1-2.347-.306c-.584.296-1.925.864-4.181 1.234-.2.032-.352-.176-.273-.362.354-.836.674-1.95.77-2.966C.744 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7M5 8a1 1 0 1 0-2 0 1 1 0 0 0 2 0m4 0a1 1 0 1 0-2 0 1 1 0 0 0 2 0m3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
            </svg>
            <span class="stat-number">{{ stats.total_messages }}</span>
            <span class="stat-label">Total Messages</span>
        </div>
    </a>

</div>
{% endblock %}
